<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="forestsky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3A5C"/>
      <stop offset="50%" style="stop-color:#2E7D5C"/>
      <stop offset="100%" style="stop-color:#4CAF50"/>
    </linearGradient>
    <linearGradient id="forestfloor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5D4037"/>
      <stop offset="100%" style="stop-color:#3E2723"/>
    </linearGradient>
    <linearGradient id="tree1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E20"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="tree2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#33691E"/>
      <stop offset="100%" style="stop-color:#558B2F"/>
    </linearGradient>
    <filter id="foggy">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="treeglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Sky through trees -->
  <rect width="800" height="500" fill="url(#forestsky)"/>
  <!-- Sun rays through trees -->
  <g opacity="0.15" fill="#FFD700">
    <polygon points="380,0 340,300 420,300"/>
    <polygon points="480,0 440,300 520,300"/>
    <polygon points="280,0 240,300 320,300"/>
  </g>
  <!-- Far background trees (misty) -->
  <g opacity="0.3" fill="#2D5A2D" filter="url(#foggy)">
    <ellipse cx="80" cy="200" rx="60" ry="180"/>
    <ellipse cx="160" cy="180" rx="55" ry="190"/>
    <ellipse cx="640" cy="190" rx="60" ry="180"/>
    <ellipse cx="720" cy="210" rx="55" ry="170"/>
  </g>
  <!-- Middle trees -->
  <g>
    <!-- Tree 1 left -->
    <rect x="30" y="80" width="28" height="320" fill="#4E342E"/>
    <ellipse cx="44" cy="90" rx="70" ry="100" fill="url(#tree1)"/>
    <ellipse cx="44" cy="130" rx="80" ry="90" fill="url(#tree1)"/>
    <ellipse cx="44" cy="170" rx="75" ry="80" fill="url(#tree2)"/>
    <!-- Tree 2 left-mid -->
    <rect x="155" y="100" width="22" height="290" fill="#4E342E"/>
    <ellipse cx="166" cy="110" rx="55" ry="80" fill="url(#tree1)"/>
    <ellipse cx="166" cy="148" rx="62" ry="72" fill="url(#tree2)"/>
    <!-- Tree 3 right-mid -->
    <rect x="622" y="95" width="22" height="295" fill="#4E342E"/>
    <ellipse cx="633" cy="105" rx="55" ry="80" fill="url(#tree1)"/>
    <ellipse cx="633" cy="143" rx="62" ry="72" fill="url(#tree2)"/>
    <!-- Tree 4 right -->
    <rect x="740" y="75" width="28" height="325" fill="#4E342E"/>
    <ellipse cx="754" cy="88" rx="70" ry="100" fill="url(#tree1)"/>
    <ellipse cx="754" cy="125" rx="80" ry="90" fill="url(#tree1)"/>
    <ellipse cx="754" cy="165" rx="75" ry="82" fill="url(#tree2)"/>
  </g>
  <!-- Ground / forest floor -->
  <rect x="0" y="340" width="800" height="160" fill="url(#forestfloor)"/>
  <rect x="0" y="338" width="800" height="6" fill="#3E2723"/>
  <!-- Ground texture - leaves and roots -->
  <g opacity="0.4">
    <ellipse cx="100" cy="380" rx="30" ry="10" fill="#2D5A2D"/>
    <ellipse cx="250" cy="400" rx="25" ry="8" fill="#3A7A2A"/>
    <ellipse cx="500" cy="385" rx="28" ry="9" fill="#2D5A2D"/>
    <ellipse cx="680" cy="395" rx="22" ry="8" fill="#3A7A2A"/>
  </g>
  <!-- Fallen leaves -->
  <g fill="#FF8C00" opacity="0.5">
    <ellipse cx="180" cy="355" rx="8" ry="5" transform="rotate(30 180 355)"/>
    <ellipse cx="350" cy="362" rx="7" ry="4" transform="rotate(-20 350 362)"/>
    <ellipse cx="580" cy="358" rx="9" ry="5" transform="rotate(45 580 358)"/>
    <ellipse cx="700" cy="370" rx="6" ry="4" transform="rotate(-35 700 370)"/>
  </g>
  <!-- Path through forest -->
  <path d="M300,500 Q350,420 380,340 Q400,290 420,340 Q450,420 500,500" fill="#6D4C41" opacity="0.6"/>
  <!-- Light dappling effect -->
  <g opacity="0.08" fill="#FFD700">
    <circle cx="380" cy="250" r="40"/>
    <circle cx="450" cy="320" r="30"/>
    <circle cx="310" cy="310" r="25"/>
  </g>
  <!-- Main dog on leash -->
  <g transform="translate(340, 310)">
    <!-- Body running/trotting -->
    <ellipse cx="0" cy="0" rx="70" ry="34" fill="#D4A96A" filter="url(#sh3)" transform="rotate(-8)"/>
    <!-- Head -->
    <circle cx="68" cy="-18" r="32" fill="#D4A96A"/>
    <!-- Floppy ear -->
    <ellipse cx="57" cy="-30" rx="14" ry="20" fill="#C08848" transform="rotate(-15 57 -30)"/>
    <!-- Eye -->
    <circle cx="76" cy="-22" r="7" fill="#2A1810"/>
    <circle cx="78" cy="-24" r="2.2" fill="#fff"/>
    <!-- Nose -->
    <ellipse cx="88" cy="-14" rx="6" ry="4" fill="#2A1810"/>
    <!-- Happy sniffing mouth -->
    <path d="M82 -9 Q88 -2 94 -9" fill="#E06080"/>
    <!-- Tongue -->
    <ellipse cx="88" cy="-4" rx="7" ry="5" fill="#E06080"/>
    <!-- Legs trotting -->
    <line x1="-20" y1="18" x2="-35" y2="48" stroke="#C08848" stroke-width="11" stroke-linecap="round"/>
    <line x1="0" y1="22" x2="5" y2="50" stroke="#C08848" stroke-width="11" stroke-linecap="round"/>
    <line x1="25" y1="18" x2="45" y2="45" stroke="#C08848" stroke-width="11" stroke-linecap="round"/>
    <line x1="45" y1="12" x2="38" y2="-15" stroke="#C08848" stroke-width="11" stroke-linecap="round"/>
    <!-- Tail up wagging -->
    <path d="M-62 -5 Q-95 -38 -80 -62 Q-65 -80 -60 -55" fill="none" stroke="#D4A96A" stroke-width="12" stroke-linecap="round"/>
  </g>
  <!-- Leash -->
  <path d="M440 310 Q490 260 540 240 Q580 225 600 200" fill="none" stroke="#8B6B45" stroke-width="4" stroke-dasharray="0" stroke-linecap="round"/>
  <!-- Handler hand holding leash -->
  <g transform="translate(590,185)">
    <rect x="-15" y="-8" width="45" height="55" rx="8" fill="#D4A96A"/>
    <circle cx="-8" cy="-10" r="9" fill="#D4A96A"/>
    <circle cx="5" cy="-12" r="9" fill="#D4A96A"/>
    <circle cx="18" cy="-10" r="9" fill="#D4A96A"/>
  </g>
  <!-- Second smaller dog sniffing ground -->
  <g transform="translate(200, 340)">
    <ellipse cx="0" cy="0" rx="48" ry="24" fill="#8B6B45"/>
    <!-- Head pointing down sniffing -->
    <circle cx="40" cy="10" r="24" fill="#8B6B45"/>
    <!-- Ear -->
    <ellipse cx="34" cy="-2" rx="11" ry="16" fill="#6B4A2A" transform="rotate(-5)"/>
    <!-- Eye -->
    <circle cx="46" cy="8" r="6" fill="#2A1810"/>
    <circle cx="48" cy="6" r="1.8" fill="#fff"/>
    <!-- Sniffing nose (pointing down) -->
    <ellipse cx="56" cy="17" rx="6" ry="4" fill="#2A1810"/>
    <!-- Legs -->
    <line x1="-18" y1="14" x2="-22" y2="36" stroke="#7A5A35" stroke-width="9" stroke-linecap="round"/>
    <line x1="0" y1="18" x2="-3" y2="40" stroke="#7A5A35" stroke-width="9" stroke-linecap="round"/>
    <line x1="22" y1="14" x2="28" y2="36" stroke="#7A5A35" stroke-width="9" stroke-linecap="round"/>
    <line x1="38" y1="18" x2="50" y2="36" stroke="#7A5A35" stroke-width="9" stroke-linecap="round"/>
    <!-- Tail pointing up (excited) -->
    <path d="M-43 -3 Q-65 -28 -55 -48" fill="none" stroke="#8B6B45" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- Fireflies / light dots in forest -->
  <g fill="#FFE44D" opacity="0.6">
    <circle cx="500" cy="200" r="3" filter="url(#treeglow)"/>
    <circle cx="260" cy="220" r="2.5" filter="url(#treeglow)"/>
    <circle cx="580" cy="250" r="2" filter="url(#treeglow)"/>
    <circle cx="350" cy="180" r="2.5" filter="url(#treeglow)"/>
    <circle cx="450" cy="160" r="2" filter="url(#treeglow)"/>
  </g>
  <!-- Birds -->
  <g stroke="#fff" stroke-width="1.5" fill="none" opacity="0.3">
    <path d="M390 50 Q398 44 406 50"/>
    <path d="M420 38 Q428 32 436 38"/>
    <path d="M360 60 Q368 54 376 60"/>
  </g>
  <!-- Mushrooms on ground -->
  <g>
    <ellipse cx="160" cy="345" rx="12" ry="6" fill="#FF4500" opacity="0.7"/>
    <rect x="157" y="345" width="6" height="15" fill="#F5DEB3" opacity="0.7"/>
    <circle cx="160" cy="342" r="6" fill="#fff" opacity="0.4"/>
    <ellipse cx="620" cy="348" rx="10" ry="5" fill="#8B4513" opacity="0.7"/>
    <rect x="617" y="348" width="5" height="12" fill="#F5DEB3" opacity="0.7"/>
  </g>
</svg>
