<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#E0F4FF"/>
    </linearGradient>
    <linearGradient id="grass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5CB85C"/>
      <stop offset="100%" style="stop-color:#3D8B37"/>
    </linearGradient>
    <linearGradient id="grassFar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6FCF6F"/>
      <stop offset="100%" style="stop-color:#4CAF50"/>
    </linearGradient>
    <linearGradient id="fence" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4B896"/>
      <stop offset="100%" style="stop-color:#B8956A"/>
    </linearGradient>
    <linearGradient id="dog1body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A96A"/>
      <stop offset="100%" style="stop-color:#C08848"/>
    </linearGradient>
    <linearGradient id="dog2body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6B45"/>
      <stop offset="100%" style="stop-color:#6B4A2A"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="680" cy="80" r="55" fill="#FFD700" opacity="0.9" filter="url(#shadow2)"/>
  <circle cx="680" cy="80" r="45" fill="#FFE44D"/>
  <!-- Sun rays -->
  <g stroke="#FFD700" stroke-width="3" opacity="0.5">
    <line x1="680" y1="15" x2="680" y2="0"/>
    <line x1="680" y1="145" x2="680" y2="160"/>
    <line x1="615" y1="80" x2="600" y2="80"/>
    <line x1="745" y1="80" x2="760" y2="80"/>
    <line x1="634" y1="34" x2="624" y2="24"/>
    <line x1="726" y1="126" x2="736" y2="136"/>
    <line x1="726" y1="34" x2="736" y2="24"/>
    <line x1="634" y1="126" x2="624" y2="136"/>
  </g>
  <!-- Clouds -->
  <g fill="#fff" opacity="0.85">
    <ellipse cx="150" cy="70" rx="65" ry="35"/>
    <ellipse cx="100" cy="80" rx="45" ry="28"/>
    <ellipse cx="200" cy="80" rx="45" ry="28"/>
    <ellipse cx="450" cy="50" rx="75" ry="38"/>
    <ellipse cx="400" cy="60" rx="50" ry="30"/>
    <ellipse cx="505" cy="62" rx="50" ry="30"/>
  </g>
  <!-- Far trees -->
  <g fill="#2D7A2D" opacity="0.6">
    <ellipse cx="50" cy="250" rx="35" ry="80"/>
    <rect x="44" y="295" width="12" height="50" fill="#5A3A1A" opacity="0.8"/>
    <ellipse cx="130" cy="235" rx="30" ry="70"/>
    <rect x="124" y="278" width="12" height="50" fill="#5A3A1A" opacity="0.8"/>
    <ellipse cx="720" cy="240" rx="35" ry="80"/>
    <rect x="714" y="283" width="12" height="50" fill="#5A3A1A" opacity="0.8"/>
    <ellipse cx="770" cy="255" rx="28" ry="65"/>
    <rect x="764" y="292" width="12" height="50" fill="#5A3A1A" opacity="0.8"/>
  </g>
  <!-- Far grass hill -->
  <ellipse cx="400" cy="295" rx="500" ry="120" fill="url(#grassFar)"/>
  <!-- Main ground -->
  <rect x="0" y="320" width="800" height="180" fill="url(#grass)"/>
  <!-- Grass texture blades -->
  <g stroke="#3D8B37" stroke-width="2" opacity="0.5">
    <line x1="50" y1="320" x2="55" y2="305"/><line x1="80" y1="320" x2="83" y2="308"/>
    <line x1="120" y1="320" x2="115" y2="306"/><line x1="160" y1="320" x2="165" y2="307"/>
    <line x1="200" y1="320" x2="204" y2="308"/><line x1="250" y1="320" x2="245" y2="305"/>
    <line x1="300" y1="320" x2="306" y2="307"/><line x1="350" y1="320" x2="348" y2="305"/>
    <line x1="400" y1="320" x2="404" y2="308"/><line x1="450" y1="320" x2="446" y2="305"/>
    <line x1="500" y1="320" x2="506" y2="307"/><line x1="550" y1="320" x2="548" y2="306"/>
    <line x1="600" y1="320" x2="604" y2="307"/><line x1="650" y1="320" x2="654" y2="306"/>
    <line x1="700" y1="320" x2="696" y2="307"/><line x1="750" y1="320" x2="754" y2="308"/>
  </g>
  <!-- Fence posts - safe enclosure -->
  <g fill="url(#fence)">
    <rect x="20" y="280" width="15" height="120" rx="3"/>
    <rect x="80" y="280" width="15" height="120" rx="3"/>
    <rect x="140" y="280" width="15" height="120" rx="3"/>
    <rect x="200" y="280" width="15" height="120" rx="3"/>
    <rect x="600" y="280" width="15" height="120" rx="3"/>
    <rect x="660" y="280" width="15" height="120" rx="3"/>
    <rect x="720" y="280" width="15" height="120" rx="3"/>
    <rect x="765" y="280" width="15" height="120" rx="3"/>
  </g>
  <!-- Horizontal fence rails -->
  <rect x="20" y="298" width="195" height="8" rx="3" fill="#C4A07A"/>
  <rect x="20" y="328" width="195" height="8" rx="3" fill="#C4A07A"/>
  <rect x="600" y="298" width="180" height="8" rx="3" fill="#C4A07A"/>
  <rect x="600" y="328" width="180" height="8" rx="3" fill="#C4A07A"/>
  <!-- Gate sign -->
  <rect x="320" y="268" width="160" height="38" rx="8" fill="#6B3A1F"/>
  <text x="400" y="283" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#E8AB50" font-weight="bold">Loving Homes</text>
  <text x="400" y="298" text-anchor="middle" font-family="Arial" font-size="10" fill="#FAF5EC">مرعى آمن</text>
  <!-- Flowers -->
  <g>
    <circle cx="280" cy="320" r="6" fill="#FF6B6B"/>
    <circle cx="280" cy="308" r="8" fill="#FFB347"/>
    <line x1="280" y1="316" x2="280" y2="340" stroke="#4CAF50" stroke-width="3"/>
    <circle cx="550" cy="318" r="6" fill="#9B59B6"/>
    <circle cx="550" cy="308" r="8" fill="#FF9FF3"/>
    <line x1="550" y1="316" x2="550" y2="340" stroke="#4CAF50" stroke-width="3"/>
    <circle cx="480" cy="322" r="5" fill="#FFD700"/>
    <circle cx="480" cy="313" r="7" fill="#FFA500"/>
    <line x1="480" y1="320" x2="480" y2="342" stroke="#4CAF50" stroke-width="3"/>
  </g>
  <!-- DOG 1 - Golden retriever running -->
  <g transform="translate(280,300)">
    <!-- Body leaning forward - running -->
    <ellipse cx="0" cy="0" rx="65" ry="32" fill="url(#dog1body)" transform="rotate(-15)" filter="url(#shadow2)"/>
    <!-- Head -->
    <circle cx="65" cy="-22" r="30" fill="#D4A96A"/>
    <!-- Ear floppy -->
    <ellipse cx="54" cy="-35" rx="13" ry="20" fill="#C08848" transform="rotate(-20 54 -35)"/>
    <!-- Eye -->
    <circle cx="74" cy="-27" r="7" fill="#2A1810"/>
    <circle cx="76" cy="-29" r="2" fill="#fff"/>
    <!-- Nose -->
    <ellipse cx="88" cy="-18" rx="6" ry="4" fill="#2A1810"/>
    <!-- Happy mouth -->
    <path d="M82 -13 Q88 -5 94 -13" fill="#E06080" stroke="none"/>
    <!-- Tongue out -->
    <ellipse cx="88" cy="-8" rx="8" ry="5" fill="#E06080"/>
    <!-- Legs running -->
    <line x1="-30" y1="15" x2="-50" y2="45" stroke="#C08848" stroke-width="10" stroke-linecap="round"/>
    <line x1="-10" y1="20" x2="-5" y2="48" stroke="#C08848" stroke-width="10" stroke-linecap="round"/>
    <line x1="20" y1="18" x2="35" y2="45" stroke="#C08848" stroke-width="10" stroke-linecap="round"/>
    <line x1="40" y1="12" x2="60" y2="38" stroke="#C08848" stroke-width="10" stroke-linecap="round"/>
    <!-- Tail up wagging -->
    <path d="M-60 -8 Q-90 -40 -70 -60 Q-55 -75 -50 -55" fill="none" stroke="#D4A96A" stroke-width="12" stroke-linecap="round"/>
    <!-- Motion lines -->
    <line x1="-80" y1="0" x2="-100" y2="-2" stroke="#87CEEB" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="-80" y1="10" x2="-105" y2="10" stroke="#87CEEB" stroke-width="2" stroke-dasharray="5,3"/>
  </g>
  <!-- DOG 2 - smaller dark dog playing -->
  <g transform="translate(490,330)">
    <ellipse cx="0" cy="0" rx="45" ry="24" fill="url(#dog2body)" filter="url(#shadow2)"/>
    <circle cx="42" cy="-15" r="22" fill="#8B6B45"/>
    <ellipse cx="33" cy="-28" rx="10" ry="15" fill="#6B4A2A" transform="rotate(-15 33 -28)"/>
    <ellipse cx="50" cy="-28" rx="10" ry="15" fill="#6B4A2A" transform="rotate(15 50 -28)"/>
    <circle cx="48" cy="-18" r="5" fill="#2A1810"/>
    <circle cx="50" cy="-20" r="1.5" fill="#fff"/>
    <ellipse cx="56" cy="-11" rx="5" ry="3" fill="#2A1810"/>
    <path d="M50 -7 Q56 -2 62 -7" fill="#E06080"/>
    <!-- Paw raised -->
    <line x1="-15" y1="14" x2="-20" y2="38" stroke="#7A5A35" stroke-width="8" stroke-linecap="round"/>
    <line x1="5" y1="18" x2="2" y2="42" stroke="#7A5A35" stroke-width="8" stroke-linecap="round"/>
    <line x1="25" y1="16" x2="38" y2="38" stroke="#7A5A35" stroke-width="8" stroke-linecap="round"/>
    <!-- Paw up playing -->
    <line x1="-30" y1="5" x2="-50" y2="-18" stroke="#7A5A35" stroke-width="8" stroke-linecap="round"/>
    <!-- Tail wagging -->
    <path d="M-42 -5 Q-65 -25 -52 -45" fill="none" stroke="#8B6B45" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- Ball -->
  <circle cx="430" cy="355" r="15" fill="#FF6B35"/>
  <path d="M420 348 Q430 342 440 348" fill="none" stroke="#CC3300" stroke-width="2"/>
  <path d="M418 358 Q430 364 442 358" fill="none" stroke="#CC3300" stroke-width="2"/>
  <!-- Butterflies -->
  <g transform="translate(180,200)" fill="#FF9FF3" opacity="0.8">
    <ellipse cx="-12" cy="0" rx="12" ry="8" transform="rotate(-30)"/>
    <ellipse cx="12" cy="0" rx="12" ry="8" transform="rotate(30)"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#8B6B45" stroke-width="1.5"/>
  </g>
  <g transform="translate(600,180)" fill="#87CEEB" opacity="0.8">
    <ellipse cx="-10" cy="0" rx="10" ry="7" transform="rotate(-25)"/>
    <ellipse cx="10" cy="0" rx="10" ry="7" transform="rotate(25)"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#5A3A1A" stroke-width="1.5"/>
  </g>
  <!-- Birds in sky -->
  <g stroke="#5A3A1A" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M350 90 Q360 82 370 90"/>
    <path d="M380 85 Q390 77 400 85"/>
    <path d="M230 110 Q240 102 250 110"/>
  </g>
  <!-- Paw prints on ground -->
  <g fill="#2D5A2D" opacity="0.3">
    <ellipse cx="380" cy="430" rx="8" ry="7"/>
    <circle cx="370" cy="420" r="4"/>
    <circle cx="380" cy="417" r="4"/>
    <circle cx="390" cy="420" r="4"/>
    <ellipse cx="420" cy="450" rx="8" ry="7"/>
    <circle cx="410" cy="440" r="4"/>
    <circle cx="420" cy="437" r="4"/>
    <circle cx="430" cy="440" r="4"/>
  </g>
</svg>
