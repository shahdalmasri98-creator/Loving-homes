<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="roadskyg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="70%" style="stop-color:#E0F0FF"/>
      <stop offset="100%" style="stop-color:#C8D8A0"/>
    </linearGradient>
    <linearGradient id="roadg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#555"/>
      <stop offset="100%" style="stop-color:#444"/>
    </linearGradient>
    <linearGradient id="vanbody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8AB50"/>
      <stop offset="100%" style="stop-color:#C8882A"/>
    </linearGradient>
    <linearGradient id="window" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8D8F0"/>
      <stop offset="100%" style="stop-color:#80B8D8"/>
    </linearGradient>
    <filter id="carsh">
      <feDropShadow dx="4" dy="8" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Sky background -->
  <rect width="800" height="500" fill="url(#roadskyg)"/>
  <!-- Clouds -->
  <g fill="#fff" opacity="0.85">
    <ellipse cx="120" cy="80" rx="65" ry="35"/>
    <ellipse cx="75" cy="90" rx="42" ry="25"/>
    <ellipse cx="168" cy="92" rx="45" ry="25"/>
    <ellipse cx="550" cy="60" rx="75" ry="38"/>
    <ellipse cx="500" cy="70" rx="50" ry="28"/>
    <ellipse cx="602" cy="72" rx="50" ry="28"/>
    <ellipse cx="720" cy="100" rx="55" ry="30"/>
  </g>
  <!-- Hills in background -->
  <ellipse cx="200" cy="320" rx="220" ry="100" fill="#6DB55C" opacity="0.5"/>
  <ellipse cx="600" cy="310" rx="250" ry="110" fill="#5CAA4C" opacity="0.5"/>
  <!-- Trees along road -->
  <g>
    <rect x="60" y="190" width="12" height="140" fill="#5D4037"/>
    <ellipse cx="66" cy="188" rx="32" ry="45" fill="#2E7D32"/>
    <rect x="720" y="195" width="12" height="135" fill="#5D4037"/>
    <ellipse cx="726" cy="193" rx="32" ry="45" fill="#33691E"/>
    <rect x="130" y="210" width="10" height="120" fill="#5D4037"/>
    <ellipse cx="135" cy="208" rx="26" ry="38" fill="#388E3C"/>
    <rect x="650" y="200" width="10" height="130" fill="#5D4037"/>
    <ellipse cx="655" cy="198" rx="28" ry="40" fill="#2E7D32"/>
  </g>
  <!-- Road -->
  <rect x="0" y="350" width="800" height="150" fill="url(#roadg)"/>
  <rect x="0" y="347" width="800" height="6" fill="#333"/>
  <!-- Road markings -->
  <g fill="#FFD700" opacity="0.7">
    <rect x="50" y="420" width="80" height="8" rx="3"/>
    <rect x="200" y="420" width="80" height="8" rx="3"/>
    <rect x="350" y="420" width="80" height="8" rx="3"/>
    <rect x="500" y="420" width="80" height="8" rx="3"/>
    <rect x="650" y="420" width="80" height="8" rx="3"/>
  </g>
  <!-- White road lines -->
  <g fill="#fff" opacity="0.4">
    <rect x="0" y="358" width="800" height="3"/>
    <rect x="0" y="490" width="800" height="3"/>
  </g>
  <!-- VAN / Car -->
  <g transform="translate(155, 230)" filter="url(#carsh)">
    <!-- Van body -->
    <rect x="0" y="50" width="430" height="140" rx="15" fill="url(#vanbody)"/>
    <!-- Van roof/cabin -->
    <rect x="10" y="10" width="180" height="80" rx="12" fill="#C8882A"/>
    <!-- Hood -->
    <rect x="180" y="60" width="100" height="50" rx="8" fill="#B87820"/>
    <!-- Windshield -->
    <rect x="22" y="18" width="155" height="62" rx="8" fill="url(#window)"/>
    <!-- Side windows -->
    <rect x="200" y="58" width="70" height="45" rx="6" fill="url(#window)"/>
    <rect x="280" y="58" width="70" height="45" rx="6" fill="url(#window)"/>
    <rect x="360" y="58" width="60" height="45" rx="6" fill="url(#window)"/>
    <!-- Dog visible through back window (excited) -->
    <!-- Dog head in window -->
    <circle cx="340" cy="80" r="22" fill="#D4A96A" clip-path="url(#wclip)"/>
    <!-- Ears -->
    <ellipse cx="328" cy="62" rx="10" ry="14" fill="#C08848" clip-path="url(#wclip)"/>
    <ellipse cx="352" cy="62" rx="10" ry="14" fill="#C08848" clip-path="url(#wclip)"/>
    <!-- Eye peeking -->
    <circle cx="332" cy="78" r="6" fill="#2A1810"/>
    <circle cx="334" cy="76" r="2" fill="#fff"/>
    <circle cx="350" cy="78" r="6" fill="#2A1810"/>
    <circle cx="352" cy="76" r="2" fill="#fff"/>
    <!-- Nose pressed to glass -->
    <ellipse cx="340" cy="88" rx="6" ry="4" fill="#2A1810"/>
    <!-- Tongue on window -->
    <ellipse cx="340" cy="96" rx="7" ry="5" fill="#E06080" opacity="0.7"/>
    <!-- Steam on window from dog breath -->
    <ellipse cx="325" cy="100" rx="15" ry="6" fill="#fff" opacity="0.2"/>
    <!-- LH Logo on van side -->
    <rect x="210" y="98" width="100" height="50" rx="8" fill="#6B3A1F" opacity="0.9"/>
    <text x="260" y="118" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#E8AB50" font-weight="bold">Loving</text>
    <text x="260" y="136" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#E8AB50" font-weight="bold">Homes</text>
    <!-- Paw print on van door -->
    <ellipse cx="340" cy="130" rx="16" ry="14" fill="#6B3A1F" opacity="0.3"/>
    <circle cx="327" cy="112" r="7" fill="#6B3A1F" opacity="0.3"/>
    <circle cx="340" cy="107" r="7" fill="#6B3A1F" opacity="0.3"/>
    <circle cx="353" cy="112" r="7" fill="#6B3A1F" opacity="0.3"/>
    <!-- Wheels -->
    <circle cx="80" cy="195" r="52" fill="#222"/>
    <circle cx="80" cy="195" r="40" fill="#444"/>
    <circle cx="80" cy="195" r="18" fill="#888"/>
    <circle cx="80" cy="195" r="8" fill="#AAA"/>
    <!-- Wheel spokes -->
    <g stroke="#666" stroke-width="3">
      <line x1="80" y1="155" x2="80" y2="177"/>
      <line x1="80" y1="213" x2="80" y2="235"/>
      <line x1="40" y1="195" x2="62" y2="195"/>
      <line x1="98" y1="195" x2="120" y2="195"/>
      <line x1="52" y1="167" x2="67" y2="182"/>
      <line x1="93" y1="208" x2="108" y2="223"/>
      <line x1="108" y1="167" x2="93" y2="182"/>
      <line x1="67" y1="208" x2="52" y2="223"/>
    </g>
    <circle cx="350" cy="195" r="52" fill="#222"/>
    <circle cx="350" cy="195" r="40" fill="#444"/>
    <circle cx="350" cy="195" r="18" fill="#888"/>
    <circle cx="350" cy="195" r="8" fill="#AAA"/>
    <g stroke="#666" stroke-width="3">
      <line x1="350" y1="155" x2="350" y2="177"/>
      <line x1="350" y1="213" x2="350" y2="235"/>
      <line x1="310" y1="195" x2="332" y2="195"/>
      <line x1="368" y1="195" x2="390" y2="195"/>
      <line x1="322" y1="167" x2="337" y2="182"/>
      <line x1="363" y1="208" x2="378" y2="223"/>
      <line x1="378" y1="167" x2="363" y2="182"/>
      <line x1="337" y1="208" x2="322" y2="223"/>
    </g>
    <!-- Headlight -->
    <ellipse cx="430" cy="105" rx="18" ry="14" fill="#FFE090"/>
    <ellipse cx="430" cy="105" rx="12" ry="9" fill="#FFD700"/>
    <!-- Exhaust smoke -->
    <circle cx="-15" cy="170" r="12" fill="#999" opacity="0.3"/>
    <circle cx="-28" cy="158" r="10" fill="#999" opacity="0.2"/>
    <circle cx="-38" cy="148" r="8" fill="#999" opacity="0.15"/>
    <!-- Motion lines -->
    <g stroke="#C8882A" stroke-width="2" opacity="0.25" stroke-dasharray="15,8">
      <line x1="-60" y1="100" x2="-120" y2="100"/>
      <line x1="-60" y1="120" x2="-130" y2="120"/>
      <line x1="-60" y1="140" x2="-110" y2="140"/>
    </g>
  </g>
  <!-- Road sign -->
  <rect x="640" y="230" width="110" height="65" rx="8" fill="#6B3A1F"/>
  <rect x="688" y="295" width="12" height="70" fill="#8B6B45"/>
  <text x="695" y="260" text-anchor="middle" font-family="Arial" font-size="11" fill="#FAF5EC">Loving Homes</text>
  <text x="695" y="280" text-anchor="middle" font-family="Arial" font-size="11" fill="#E8AB50">2 km ←</text>
  <!-- Road curb -->
  <rect x="0" y="348" width="800" height="5" fill="#AAA" opacity="0.5"/>
</svg>
